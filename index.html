<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnCast — AI Learning Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#08090e;--surface:#0d0f17;--card:#13151f;--card2:#191c28;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--lime:#c8ff40;--lime-dim:rgba(200,255,64,0.12);--cyan:#40e0ff;--cyan-dim:rgba(64,224,255,0.1);--coral:#ff5f5f;--coral-dim:rgba(255,95,95,0.12);--amber:#ffb840;--green:#40c880;--text:#eef0ff;--muted:#5a6280;--muted2:#8890b0;--font-head:'Syne',system-ui,sans-serif;--font-body:'DM Sans',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;--r:12px;--r-sm:8px;--r-lg:20px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(200,255,64,0.04) 0%,transparent 55%),radial-gradient(ellipse 50% 60% at 85% 90%,rgba(64,224,255,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
img,svg{max-width:100%}
.hdr{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:rgba(8,9,14,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.logo{font-family:var(--font-head);font-size:1.3rem;font-weight:900;color:var(--lime);letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;background:var(--lime);border-radius:50%;display:inline-block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
.lang-row{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px}
.lb{padding:4px 10px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:0.7rem;font-weight:500;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em}
.lb.on{background:var(--lime);color:#08090e}
.lb:hover:not(.on){color:var(--text)}
.wrap{max-width:860px;margin:0 auto;padding:32px 20px 80px;position:relative;z-index:1}
.hero{text-align:center;padding:40px 0 36px}
.hero h1{font-family:var(--font-head);font-size:clamp(2.4rem,6vw,4rem);font-weight:900;letter-spacing:-0.03em;line-height:1.05;color:var(--text);margin-bottom:10px}
.hero h1 span{color:var(--lime)}
.hero p{font-size:0.97rem;color:var(--muted2);max-width:460px;margin:0 auto}
.src-tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;margin-bottom:14px}
.src-tab{flex:1;padding:9px 12px;border:none;background:transparent;color:var(--muted2);font-family:var(--font-body);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.src-tab.on{background:var(--card2);color:var(--text)}
.src-tab:hover:not(.on){color:var(--text);background:rgba(255,255,255,0.03)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:36px 24px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;background:rgba(200,255,64,0.02)}
.drop-zone:hover,.drop-zone.over{border-color:var(--lime);background:var(--lime-dim)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.dz-icon{font-size:2.4rem;display:block;margin-bottom:10px}
.dz-title{font-size:1rem;font-weight:600;margin-bottom:4px}
.dz-sub{font-size:0.82rem;color:var(--muted2)}
.file-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;justify-content:center}
.file-tag{display:inline-flex;align-items:center;gap:6px;background:var(--lime-dim);border:1px solid rgba(200,255,64,0.25);color:var(--lime);padding:5px 10px;border-radius:20px;font-family:var(--font-mono);font-size:0.72rem;max-width:200px}
.file-tag span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-tag .rm{cursor:pointer;opacity:0.6;flex-shrink:0;font-style:normal;font-size:0.9rem;line-height:1}
.file-tag .rm:hover{opacity:1}
.url-row{display:flex;gap:8px}
.url-inp{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;color:var(--text);font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.15s}
.url-inp:focus{border-color:var(--cyan)}
.url-inp::placeholder{color:var(--muted)}
.paste-area{width:100%;min-height:140px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;color:var(--text);font-family:var(--font-body);font-size:0.88rem;line-height:1.6;outline:none;resize:vertical;transition:border-color 0.15s}
.paste-area:focus{border-color:var(--cyan)}
.paste-area::placeholder{color:var(--muted)}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
@media(max-width:560px){.settings-row{grid-template-columns:1fr}}
.sl{font-family:var(--font-mono);font-size:0.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:block}
.opts{display:flex;gap:6px;flex-wrap:wrap}
.ob{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--font-body);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s}
.ob.on{background:var(--lime);border-color:var(--lime);color:#08090e;font-weight:600}
.ob:hover:not(.on){border-color:var(--lime);color:var(--text)}
.tog-row{display:flex;align-items:center;gap:12px;padding:16px 0 4px}
.tog{position:relative;width:42px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-track{position:absolute;inset:0;background:var(--border2);border-radius:11px;cursor:pointer;transition:background 0.2s}
.tog-track::after{content:'';position:absolute;left:3px;top:3px;width:16px;height:16px;background:var(--muted2);border-radius:50%;transition:all 0.2s}
.tog input:checked~.tog-track{background:var(--lime)}
.tog input:checked~.tog-track::after{transform:translateX(20px);background:#08090e}
.tog-lbl{font-size:0.9rem;font-weight:500;cursor:pointer;user-select:none}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r-sm);border:none;font-family:var(--font-body);font-weight:600;font-size:0.88rem;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn-lime{background:var(--lime);color:#08090e}
.btn-lime:hover{opacity:0.9;transform:translateY(-1px)}
.btn-lime:active{transform:translateY(0)}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--border2);background:rgba(255,255,255,0.09)}
.btn-gen{width:100%;justify-content:center;padding:14px 24px;font-size:1rem;border-radius:var(--r);margin-top:20px;letter-spacing:0.01em}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none!important}
.proc-wrap{text-align:center;padding:80px 20px}
.spinner{width:80px;height:80px;margin:0 auto 28px;position:relative}
.sp-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--lime);animation:spin 1s linear infinite}
.sp-ring2{position:absolute;inset:8px;border-radius:50%;border:2px solid transparent;border-top-color:var(--cyan);animation:spin 1.5s linear infinite reverse}
.sp-inner{position:absolute;inset:18px;border-radius:50%;background:var(--lime-dim);display:flex;align-items:center;justify-content:center;font-size:1.4rem}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-title{font-family:var(--font-head);font-size:1.6rem;font-weight:800;margin-bottom:8px}
.proc-msg{color:var(--muted2);font-size:0.9rem;min-height:22px;transition:opacity 0.3s}
.prog-outer{width:260px;height:3px;background:var(--border);border-radius:2px;margin:20px auto 0;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--lime),var(--cyan));border-radius:2px;width:0;transition:width 0.6s ease}
.res-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.res-hdr-left{display:flex;flex-direction:column;gap:2px}
.res-title{font-family:var(--font-head);font-size:1.2rem;font-weight:800;color:var(--lime)}
.res-sub{font-size:0.8rem;color:var(--muted2)}
.res-actions{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;margin-bottom:18px;overflow-x:auto}
.tab-btn{flex:1;min-width:72px;padding:7px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted2);font-family:var(--font-body);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn.on{background:var(--card2);color:var(--text)}
.tab-btn:hover:not(.on){color:var(--text)}
.tc{display:none}
.tc.on{display:block}
.pod-player{background:var(--lime-dim);border:1px solid rgba(200,255,64,0.15);border-radius:var(--r);padding:22px;display:flex;align-items:center;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.play-btn{width:52px;height:52px;border-radius:50%;background:var(--lime);border:none;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;color:#08090e;flex-shrink:0}
.play-btn:hover{transform:scale(1.05)}
.wave{display:flex;align-items:center;gap:3px;height:36px;flex:1;min-width:80px}
.wb{width:3px;border-radius:2px;background:var(--lime);opacity:0.35;animation:widle 1.8s ease-in-out infinite}
.wb:nth-child(2n){animation-delay:0.15s}.wb:nth-child(3n){animation-delay:0.3s}.wb:nth-child(4n){animation-delay:0.08s}.wb:nth-child(5n){animation-delay:0.22s}.wb:nth-child(7n){animation-delay:0.45s}
@keyframes widle{0%,100%{height:6px}50%{height:22px}}
.playing .wb{opacity:0.9;animation:wplay 0.7s ease-in-out infinite}
.playing .wb:nth-child(2n){animation-delay:0.07s}.playing .wb:nth-child(3n){animation-delay:0.14s}.playing .wb:nth-child(4n){animation-delay:0.21s}.playing .wb:nth-child(5n){animation-delay:0.28s}
@keyframes wplay{0%,100%{height:5px}50%{height:34px}}
.pod-info{flex:1}
.pod-label{font-family:var(--font-mono);font-size:0.68rem;color:var(--lime);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px}
.pod-name{font-weight:600;font-size:0.95rem}
.script-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;font-size:0.88rem;line-height:1.75;color:var(--muted2);max-height:220px;overflow-y:auto}
.sum-content{font-size:0.93rem;line-height:1.85;color:var(--muted2);white-space:pre-wrap}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:10px;animation:fadein 0.3s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-family:var(--font-mono);font-size:0.68rem;color:var(--lime);font-weight:500;margin-bottom:5px;letter-spacing:0.05em}
.q-text{font-size:0.93rem;font-weight:600;line-height:1.5;margin-bottom:12px}
.opts-list{list-style:none;display:grid;gap:5px}
.opt-item{padding:7px 12px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:0.83rem;color:var(--muted2);display:flex;gap:8px;transition:all 0.15s}
.opt-item.corr{background:rgba(64,200,128,0.1);border-color:rgba(64,200,128,0.3);color:#6ee7b0}
.opt-ltr{font-family:var(--font-mono);font-weight:500;color:var(--muted);min-width:14px}
.opt-item.corr .opt-ltr{color:var(--green)}
.expl-box{background:var(--cyan-dim);border:1px solid rgba(64,224,255,0.15);border-radius:var(--r-sm);padding:10px 14px;font-size:0.82rem;color:#a0e8ff;margin-top:8px;display:none;line-height:1.6}
.expl-box.show{display:block}
.ans-toggle{margin-top:9px}
.game-start-card{text-align:center;padding:44px 24px}
.gs-icon{font-size:4rem;margin-bottom:14px;display:block}
.gs-title{font-family:var(--font-head);font-size:1.8rem;font-weight:900;margin-bottom:6px}
.gs-sub{color:var(--muted2);font-size:0.9rem;line-height:1.6;margin-bottom:24px}
.game-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hud-box{text-align:center}
.hud-val{font-family:var(--font-head);font-size:1.4rem;font-weight:900;line-height:1}
.hud-lbl{font-family:var(--font-mono);font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.timer-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:14px;overflow:hidden}
.timer-fill{height:100%;background:var(--lime);border-radius:2px;transition:width 0.1s linear}
.timer-fill.warn{background:var(--amber)}
.timer-fill.dang{background:var(--coral)}
.gq-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.gq-prog{font-family:var(--font-mono);font-size:0.7rem;color:var(--muted);margin-bottom:6px}
.gq-text{font-size:1rem;font-weight:600;line-height:1.5}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:480px){.gopts{grid-template-columns:1fr}}
.gopt{padding:13px 14px;border-radius:var(--r);border:1.5px solid var(--border2);background:var(--card);color:var(--text);font-family:var(--font-body);font-size:0.88rem;font-weight:500;cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.4}
.gopt:hover:not(:disabled){border-color:var(--lime);background:var(--lime-dim)}
.gopt.corr{background:rgba(64,200,128,0.12);border-color:var(--green);color:#6ee7b0}
.gopt.wrng{background:var(--coral-dim);border-color:var(--coral);color:#fca5a5}
.gopt:disabled{cursor:default}
.g-fb{margin-top:12px;padding:14px;border-radius:var(--r);display:none}
.g-fb.show{display:block}
.g-fb.corr-fb{background:rgba(64,200,128,0.08);border:1px solid rgba(64,200,128,0.2)}
.g-fb.wrng-fb{background:var(--coral-dim);border:1px solid rgba(255,95,95,0.2)}
.fb-head{font-weight:700;margin-bottom:3px;font-size:0.95rem}
.fb-corr .fb-head{color:var(--green)}
.fb-wrng .fb-head{color:var(--coral)}
.fb-body{font-size:0.83rem;color:var(--muted2)}
.go-card{text-align:center;padding:44px 24px}
.go-em{font-size:5rem;display:block;margin-bottom:14px}
.go-title{font-family:var(--font-head);font-size:2rem;font-weight:900;margin-bottom:6px}
.final-score{font-family:var(--font-head);font-size:4.5rem;font-weight:900;color:var(--lime);line-height:1;margin:16px 0 6px}
.final-lbl{font-size:0.85rem;color:var(--muted2);margin-bottom:24px}
.go-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.err-banner{background:var(--coral-dim);border:1px solid rgba(255,95,95,0.3);border-radius:var(--r-sm);padding:12px 16px;font-size:0.85rem;color:#fca5a5;margin-top:12px;display:none}
.err-banner.show{display:block}
.voice-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.voice-lbl{font-family:var(--font-mono);font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap}
.vb{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted2);font-family:var(--font-body);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px}
.vb.on{background:var(--lime);border-color:var(--lime);color:#08090e;font-weight:600}
.vb:hover:not(.on){border-color:var(--lime);color:var(--text)}
.status-ok{color:var(--green);font-size:0.82rem;font-family:var(--font-mono)}
.status-err{color:var(--coral);font-size:0.82rem;font-family:var(--font-mono)}
.status-info{color:var(--muted2);font-size:0.82rem;font-family:var(--font-mono)}
.mt8{margin-top:8px}.mt16{margin-top:16px}
.divider{height:1px;background:var(--border);margin:18px 0}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<header class="hdr">
  <div class="logo"><span class="logo-dot"></span>LearnCast</div>
  <div class="lang-row">
    <button class="lb" onclick="setL('az')">AZ</button>
    <button class="lb on" onclick="setL('en')">EN</button>
    <button class="lb" onclick="setL('tr')">TR</button>
    <button class="lb" onclick="setL('ru')">RU</button>
  </div>
</header>

<div class="wrap">

  <!-- UPLOAD VIEW -->
  <div id="vUpload">
    <div class="hero">
      <h1 id="hTitle">Learn<span>Cast</span></h1>
      <p id="hSub">Transform any document, image or link into a podcast, summary and interactive quiz.</p>
    </div>
    <div class="card">
      <div class="src-tabs">
        <button class="src-tab on" id="stFile" onclick="setSrc('file')">📁 <span id="stFileLbl">File</span></button>
        <button class="src-tab" id="stUrl" onclick="setSrc('url')">🔗 <span id="stUrlLbl">URL</span></button>
        <button class="src-tab" id="stText" onclick="setSrc('text')">✏️ <span id="stTextLbl">Paste Text</span></button>
      </div>

      <!-- File -->
      <div id="srcFile">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept=".pdf,.txt,.md,.csv,image/*" multiple>
          <span class="dz-icon">📂</span>
          <div class="dz-title" id="dzTitle">Drag & drop or click to upload</div>
          <div class="dz-sub" id="dzSub">PDF · Images · Text files · Up to 5 files</div>
        </div>
        <div class="file-badges" id="fileBadges"></div>
      </div>

      <!-- URL -->
      <div id="srcUrl" class="hidden">
        <label class="sl" id="urlLbl">Paste a URL</label>
        <div class="url-row">
          <input type="url" class="url-inp" id="urlInp" placeholder="https://...">
          <button class="btn btn-ghost" id="fetchBtn" onclick="doFetch()">🔗 <span id="fetchLbl">Fetch</span></button>
        </div>
        <div id="urlStatus" class="mt8"></div>
      </div>

      <!-- Text -->
      <div id="srcText" class="hidden">
        <label class="sl" id="textLbl">Paste your text</label>
        <textarea class="paste-area" id="pasteArea" placeholder="Paste any text here — articles, notes, lecture transcripts, book excerpts…"></textarea>
      </div>

      <div class="err-banner" id="errBanner"></div>
      <div class="divider"></div>

      <div class="settings-row">
        <div>
          <span class="sl" id="qcLbl">Questions</span>
          <div class="opts">
            <button class="ob" onclick="setOpt('qc',5,this)">5</button>
            <button class="ob on" onclick="setOpt('qc',10,this)">10</button>
            <button class="ob" onclick="setOpt('qc',15,this)">15</button>
          </div>
        </div>
        <div>
          <span class="sl" id="diffLbl">Difficulty</span>
          <div class="opts">
            <button class="ob on" onclick="setOpt('diff','easy',this)">😊 <span id="dEasyL">Easy</span></button>
            <button class="ob" onclick="setOpt('diff','fun',this)">🎉 <span id="dFunL">Fun</span></button>
            <button class="ob" onclick="setOpt('diff','hard',this)">🔥 <span id="dHardL">Hard</span></button>
          </div>
        </div>
      </div>

      <div class="tog-row">
        <label class="tog"><input type="checkbox" id="gameTog" onchange="S.game=this.checked"><span class="tog-track"></span></label>
        <span class="tog-lbl" id="gameModeLbl">Game Mode</span>
      </div>

      <button class="btn btn-lime btn-gen" id="genBtn" onclick="doGenerate()">✨ <span id="genLbl">Generate Learning Content</span></button>
    </div>
  </div>

  hideErr();
}

// ─── URL FETCH ────────────────────────────────────────────
async function doFetch(){
  const url=document.getElementById('urlInp').value.trim();
  if(!url)return;
  setStatus('info',tx('fetchingMsg'));
  hideErr();
  try{
    const text=await fetchURL(url);
    S.urlText=text;S.files=[];
    S.sourceTitle=url.replace(/^https?:\/\//,'').slice(0,60);
    setStatus('ok',tx('fetchedMsg')+' ('+text.length+' chars)');
  }catch(e){
    S.urlText=null;
    setStatus('err',tx('errFetch'));
  }
}

async function fetchURL(url){
  const proxies=[
    // proxy 1 - codetabs (very reliable)
    {u:`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,raw:true},
    // proxy 2 - corsproxy.io
    {u:`https://corsproxy.io/?url=${encodeURIComponent(url)}`,raw:true},
    // proxy 3 - allorigins
    {u:`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,raw:true},
    // proxy 4 - allorigins JSON wrapper
    {u:`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,json:'contents'},
    // proxy 5 - thingproxy
    {u:`https://thingproxy.freeboard.io/fetch/${url}`,raw:true}
  ];
  for(const p of proxies){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),12000);
      const r=await fetch(p.u,{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok)continue;
      let html;
      if(p.json){const j=await r.json();html=j[p.json]||'';}
      else{html=await r.text();}
      if(!html||html.length<100)continue;
      const txt=parseHTML(html);
      if(txt.length>80)return txt;
    }catch(e){continue;}
  }
  throw new Error('All proxies failed');
}

function parseHTML(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  ['script','style','nav','footer','header','aside','noscript','iframe','svg'].forEach(t=>
    doc.querySelectorAll(t).forEach(e=>e.remove()));
  const title=doc.querySelector('title')?.textContent||'';
  const main=doc.querySelector('main,article,[role="main"],.content,.post-content');
  const txt=(main||doc.body)?.innerText||doc.body?.textContent||'';
  return((title?'Title: '+title+'\n\n':'')+txt.replace(/\s+/g,' ').trim()).slice(0,8000);
}

function setStatus(type,msg){

// ─── GENERATE ─────────────────────────────────────────────
async function doGenerate(){
  hideErr();
  const hasPaste=S.srcType==='text'&&document.getElementById('pasteArea').value.trim().length>0;
  const hasFiles=S.files.length>0;
  const hasURL=!!S.urlText;
  if(!hasFiles&&!hasURL&&!hasPaste){
    showErr(tx('errNoContent'));return;
  }
  showV('proc');startProc();
  try{
    const r=await callAI();
    S.results=r;stopProc();showResults();
  }catch(e){
    stopProc();showV('upload');
    showErr(tx('errAPI')+' '+e.message);
    console.error('LearnCast error:',e);
  }
}

async function callAI(){
  const t=L[S.lang];
  const prompt=`You are an expert educational content creator. Analyze the provided content and create high-quality learning materials in ${t.langName}.

Generate in ${t.langName}:
1. PODCAST SCRIPT — Natural, engaging 250-300 word script spoken by a friendly podcast host.
2. SUMMARY — Clear bullet-point summary 150-200 words covering the key points.
3. EXACTLY ${S.qc} MULTIPLE CHOICE QUESTIONS — ${t.diffDesc[S.diff]}. Each has exactly 4 options. "correct" must be 0, 1, 2, or 3 (index of the correct option).

Respond ONLY with valid JSON (no markdown, no backticks, no extra text):
{"title":"short descriptive title","podcast":"full script text","summary":"full summary text","questions":[{"q":"question text","options":["option A","option B","option C","option D"],"correct":0,"explanation":"brief explanation why the answer is correct"}]}

IMPORTANT: Return pure JSON only. No \`\`\`json fences. No preamble.`;

  const contentBlocks=[];

  if(S.files.length>0){
    for(const f of S.files){
      const nameL=f.name.toLowerCase();
      const isPdf=f.type==='application/pdf'||nameL.endsWith('.pdf');
      const isImg=f.type.startsWith('image/')||/\.(jpe?g|png|gif|webp|bmp|tiff?)$/i.test(nameL);
      if(isPdf){
        const b64=await toB64(f);
        contentBlocks.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
      } else if(isImg){
        // Read as data URL so the browser sniffs the real media type from bytes
        const dataUrl=await toDataUrl(f);
        const match=dataUrl.match(/^data:(image\/[a-zA-Z0-9+.-]+);base64,(.+)$/);
        if(!match)throw new Error('Could not read image: '+f.name);
        let mt=match[1];
        const b64=match[2];
        // Only types Anthropic accepts
        const allowed=['image/jpeg','image/png','image/gif','image/webp'];
        if(!allowed.includes(mt))mt='image/jpeg';
        contentBlocks.push({type:'image',source:{type:'base64',media_type:mt,data:b64}});
      } else {
        const txt=await toText(f);
        contentBlocks.push({type:'text',text:'--- File: '+f.name+' ---\n'+txt.slice(0,5000)});
      }
    }
  } else if(S.urlText){
    contentBlocks.push({type:'text',text:'CONTENT FROM URL:\n'+S.urlText});
  } else {
    const paste=document.getElementById('pasteArea').value.trim();
    contentBlocks.push({type:'text',text:'CONTENT:\n'+paste.slice(0,8000)});
  }

  contentBlocks.push({type:'text',text:prompt});

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-version':'2023-06-01'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4000,
      messages:[{role:'user',content:contentBlocks}]
    })
  });

  if(!res.ok){
    let errMsg='Status '+res.status;
    try{const ed=await res.json();errMsg=ed.error?.message||errMsg;}catch(e){}
    throw new Error(errMsg);
  }

  const data=await res.json();
  if(data.error)throw new Error(data.error.message);

  const raw=data.content
    .filter(b=>b.type==='text')
    .map(b=>b.text)
    .join('');

  // Strip markdown fences if present
  const cleaned=raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
  const s=cleaned.indexOf('{'),e=cleaned.lastIndexOf('}');
  if(s<0||e<0)throw new Error('Invalid JSON response');

  let parsed;
  try{parsed=JSON.parse(cleaned.slice(s,e+1));}
  catch(je){throw new Error('JSON parse failed: '+je.message);}

  // Validate
  if(!parsed.questions||!Array.isArray(parsed.questions))throw new Error('Missing questions');
  if(!parsed.podcast)throw new Error('Missing podcast');
  if(!parsed.summary)throw new Error('Missing summary');

  return parsed;
}

function toDataUrl(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('File read error'));
    r.readAsDataURL(f);
  });
}
function toB64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('File read error'));
    r.readAsDataURL(f);
  });
}
function toText(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('File read error'));
    r.readAsText(f);
  });
}

// ─── TTS ──────────────────────────────────────────────────
function pickTTSVoice(lang,gender){
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length)return null;
  const langMap={en:'en',tr:'tr',az:'az',ru:'ru'};
  const prefix=langMap[lang]||'en';
  // Female name hints
  const femHints=['female','woman','girl','zira','helena','karen','moira','samantha','victoria','fiona','tessa','veena','ioana'];
  // Male name hints
  const malHints=['male','man','david','mark','daniel','alex','fred','jorge','stefan','thomas','james','george'];
  const hints=gender==='female'?femHints:malHints;
  const opposite=gender==='female'?malHints:femHints;
  // Filter by language prefix
  const langVoices=voices.filter(v=>v.lang.toLowerCase().startsWith(prefix));
  const pool=langVoices.length?langVoices:voices;
  // Try to find gendered voice
  const gendered=pool.find(v=>hints.some(h=>v.name.toLowerCase().includes(h)));
  if(gendered)return gendered;
  // Avoid opposite gender
  const notOpposite=pool.filter(v=>!opposite.some(h=>v.name.toLowerCase().includes(h)));
  return notOpposite[0]||pool[0]||voices[0]||null;
}

function toggleTTS(){
  if(S.ttsOn){
    window.speechSynthesis.cancel();S.ttsOn=false;
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('podPlayer').classList.remove('playing');
    return;
  }
  const langMap={en:'en-US',tr:'tr-TR',az:'az-AZ',ru:'ru-RU'};
  const u=new SpeechSynthesisUtterance(S.results.podcast);
  u.lang=langMap[S.lang]||'en-US';
  u.rate=0.93;
  // Set voice — voices may not be loaded yet, so try after a tick
  const applyVoice=()=>{
    const v=pickTTSVoice(S.lang,S.voice);
    if(v)u.voice=v;
  };
  if(window.speechSynthesis.getVoices().length){applyVoice();}
  else{window.speechSynthesis.onvoiceschanged=()=>{applyVoice();window.speechSynthesis.onvoiceschanged=null;};}
  u.onend=()=>{S.ttsOn=false;document.getElementById('playBtn').textContent='▶';document.getElementById('podPlayer').classList.remove('playing');};
  u.onerror=()=>{S.ttsOn=false;document.getElementById('playBtn').textContent='▶';document.getElementById('podPlayer').classList.remove('playing');};
  window.speechSynthesis.cancel();
  setTimeout(()=>window.speechSynthesis.speak(u),100);
  S.ttsOn=true;
  document.getElementById('playBtn').textContent='■';
  document.getElementById('podPlayer').classList.add('playing');
}

// ─── QUESTIONS ────────────────────────────────────────────
function buildQuestions(){
  const list=document.getElementById('qList');list.innerHTML='';
  (S.results.questions||[]).forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='q-card';d.style.animationDelay=(i*0.04)+'s';
    const ABCD=tx('ABCD');
    const opts=(q.options||[]).map((o,j)=>`
      <li class="opt-item" data-c="${j===q.correct}">
        <span class="opt-ltr">${ABCD[j]||j}</span><span>${escH(o)}</span>
      </li>`).join('');
    d.innerHTML=`
      <div class="q-num">Q${i+1}</div>
      <div class="q-text">${escH(q.q)}</div>
      <ul class="opts-list" id="ol-${i}">${opts}</ul>
      <div class="expl-box" id="ex-${i}">${tx('explLbl')} ${escH(q.explanation||'')}</div>
      <div class="ans-toggle">
        <button class="btn btn-ghost" style="font-size:0.78rem;padding:5px 12px" data-s="0" onclick="toggleAns(${i},this)">${tx('showAns')}</button>
      </div>`;
    list.appendChild(d);
  });
}
function toggleAns(i,btn){
  const show=btn.dataset.s==='1';
  const ol=document.getElementById('ol-'+i);
  const ex=document.getElementById('ex-'+i);
  if(show){
    ol.querySelectorAll('[data-c="true"]').forEach(li=>li.classList.remove('corr'));
    ex.classList.remove('show');
    btn.textContent=tx('showAns');btn.dataset.s='0';
  } else {
    ol.querySelectorAll('[data-c="true"]').forEach(li=>li.classList.add('corr'));
    ex.classList.add('show');
    btn.textContent=tx('hideAns');btn.dataset.s='1';
  }
}

// ─── GAME ─────────────────────────────────────────────────
let gSt={lives:3,score:0,qi:0};

function buildGameStart(){
  document.getElementById('gameArea').innerHTML=`
    <div class="card game-start-card">
      <span class="gs-icon">🎮</span>
      <div class="gs-title">${tx('gsTitle')}</div>
      <div class="gs-sub">${tx('gsSub')}</div>
      <button class="btn btn-lime" style="margin:0 auto;font-size:1rem;padding:13px 32px;border-radius:var(--r)" onclick="startGame()">${tx('startGame')}</button>
    </div>`;
}
function startGame(){
  gSt={lives:3,score:0,qi:0};gAnswered=false;gOver=false;
  renderQ();
}
function renderQ(){
  gAnswered=false;
  const q=S.results.questions[gSt.qi],n=S.results.questions.length;
  const ABCD=tx('ABCD');
  const hearts='❤️'.repeat(gSt.lives)+'🖤'.repeat(3-gSt.lives);
  const opts=(q.options||[]).map((o,i)=>`<button class="gopt" id="go-${i}" onclick="pickAns(${i})">${ABCD[i]||i}. ${escH(o)}</button>`).join('');
  document.getElementById('gameArea').innerHTML=`
    <div class="game-hud">
      <div class="hud-box"><div class="hud-val" id="gScore">${gSt.score}</div><div class="hud-lbl">${tx('scoreLbl')}</div></div>
      <div class="hud-box"><div class="hud-val" id="gLives">${hearts}</div><div class="hud-lbl">${tx('livesLbl')}</div></div>
      <div class="hud-box"><div class="hud-val" id="gTime">15</div><div class="hud-lbl">sec</div></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="tFill" style="width:100%"></div></div>
    <div class="gq-card">
      <div class="gq-prog">${tx('qLbl')} ${gSt.qi+1} ${tx('ofLbl')} ${n}</div>
      <div class="gq-text">${escH(q.q)}</div>
    </div>
    <div class="gopts">${opts}</div>
    <div class="g-fb" id="gFb"></div>
    <button class="btn btn-lime hidden" id="nextBtn" onclick="nextQ()" style="width:100%;margin-top:12px;justify-content:center">
      ${gSt.qi+1<n?'→ Next':'📊 '+tx('finalScore')}
    </button>`;
  startTimer();
}
function startTimer(){
  gTLeft=15;clearInterval(gTimer);
  gTimer=setInterval(()=>{
    gTLeft--;
    const pct=(gTLeft/15)*100;
    const f=document.getElementById('tFill'),t=document.getElementById('gTime');
    if(!f){clearInterval(gTimer);return;}
    f.style.width=pct+'%';
    if(t)t.textContent=gTLeft;
    if(gTLeft<=4)f.className='timer-fill dang';
    else if(gTLeft<=7)f.className='timer-fill warn';
    if(gTLeft<=0){clearInterval(gTimer);pickAns(-1);}
  },1000);
}
function pickAns(idx){
  if(gAnswered||gOver)return;
  gAnswered=true;clearInterval(gTimer);
  const q=S.results.questions[gSt.qi];
  const ok=idx===q.correct;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.correct)b.classList.add('corr');
    else if(i===idx&&!ok)b.classList.add('wrng');
  });
  const fb=document.getElementById('gFb');
  if(ok){
    gSt.score+=10+Math.max(0,gTLeft*2);
    fb.className='g-fb show corr-fb';
    fb.innerHTML=`<div class="fb-head fb-corr">${tx('correct')}</div><div class="fb-body">${escH(q.explanation||'')}</div>`;
    const se=document.getElementById('gScore');if(se)se.textContent=gSt.score;
  } else {
    gSt.lives--;
    fb.className='g-fb show wrng-fb';
    fb.innerHTML=`<div class="fb-head fb-wrng">${tx('wrong')}</div><div class="fb-body">${tx('explLbl')} ${escH(q.explanation||'')}</div>`;
    const le=document.getElementById('gLives');
    if(le)le.textContent='❤️'.repeat(Math.max(0,gSt.lives))+'🖤'.repeat(3-Math.max(0,gSt.lives));
  }
  if(gSt.lives<=0){gOver=true;setTimeout(()=>renderGameOver(false),1800);}
  else{const nb=document.getElementById('nextBtn');if(nb)nb.classList.remove('hidden');}
}
function nextQ(){
  if(gOver)return;
  gSt.qi++;
  if(gSt.qi>=S.results.questions.length)renderGameOver(true);
  else renderQ();
}
function renderGameOver(won){
  clearInterval(gTimer);
  document.getElementById('gameArea').innerHTML=`
    <div class="card go-card">
      <span class="go-em">${won?'🏆':'💀'}</span>
      <div class="go-title">${won?tx('youWon'):tx('gameOver')}</div>
      <div class="final-lbl">${tx('finalScore')}</div>
      <div class="final-score">${gSt.score}</div>
      <div class="final-lbl" style="margin-bottom:24px">${gSt.qi} ${tx('ofLbl')} ${S.results.questions.length} answered</div>
      <div class="go-btns">
        <button class="btn btn-lime" onclick="startGame()">🔄 ${tx('tryAgain')}</button>
        <button class="btn btn-ghost" onclick="tab('qst')">📋 ${tx('backToRes')}</button>
      </div>
    </div>`;
}
